kind = "web"
previewPath = "/"
title = "FlipIQ CSM Dashboard"
version = "1.0.0"
id = "artifacts/flipiq-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23108

[services.development]
run = "pnpm --filter @workspace/flipiq-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flipiq-dashboard", "run", "build" ]
publicDir = "artifacts/flipiq-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23108"
BASE_PATH = "/"
